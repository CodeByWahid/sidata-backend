version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/mahasiswa_db
      - JWT_SECRET=change_this_secret
    depends_on:
      - mongo
    restart: unless-stopped
volumes:
  mongo-data:
